<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Page</title>
</head>
<body>
<input type="text" id="locationReplaceUrl" placeholder="Enter URL">
<button onclick="windowlocationreplace()">Window Location Replace</button>

<script>
  function windowlocationreplace(){
    var url = document.getElementById('locationReplaceUrl').value;
    if(url){
        window.location.replace(url);
    }
}
</script>
</body>
</html>
