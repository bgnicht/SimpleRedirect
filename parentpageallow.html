<html>
  <head>
    <title>Parent page with allow iframe local</title>
  </head>
  <body>
    <div>
      <h1>This is the parent page framing simple redirect with allow local-network-access *</h1>
    </div>
    <div>
      <iframe
        src="https://bgnicht.github.io/SimpleRedirect/"
        allow="local-network-access *"
        width="100%"
        height="100%"
        frameborder="10px"
        allowfullscreen>
      </iframe>
    </div>
  </body>
</html>
